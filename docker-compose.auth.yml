# Keycloak authentication overlay for EDDI
# Used by: install.sh --with-auth
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.auth.yml up -d
#
# Pre-configured test users:
#   eddi  / eddi   (admin)
#   viewer / viewer (read-only)

services:
  eddi:
    environment:
      QUARKUS_OIDC_TENANT_ENABLED: "true"
      QUARKUS_OIDC_AUTH_SERVER_URL: "http://keycloak:8080/realms/eddi"
      QUARKUS_OIDC_CLIENT_ID: "eddi-backend"
      QUARKUS_HTTP_CORS_ORIGINS: "http://localhost:3000,http://localhost:7070"
    depends_on:
      keycloak:
        condition: service_healthy

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: "8080"
    ports:
      - "8180:8080"
    volumes:
      - keycloak-data:/opt/keycloak/data
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080; echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3; timeout 1 cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

volumes:
  keycloak-data:
