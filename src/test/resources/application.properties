# ===========================================================================
# Test-only overrides — suppress expected error-path log noise
# ===========================================================================
# Many unit tests intentionally trigger error paths (invalid URLs, injection
# attempts, retry exhaustion, rate limiting, etc.). The production code
# correctly logs these at ERROR/WARN, but in tests this creates hundreds of
# distracting lines that bury real failures.
#
# Strategy:
#   1. Keep the root test log level at WARN — real errors still surface.
#   2. Suppress specific loggers whose ERROR/WARN output is exclusively
#      caused by intentional error-path tests.
#   3. Keep framework loggers at WARN so Quarkus/CDI issues are visible.
# ===========================================================================

# --- Root level: WARN (hides INFO/DEBUG noise, keeps real errors) ---
quarkus.log.level=WARN

# --- Built-in tool error-path tests (security validation, bad input) ---
# These loggers produce 60+ ERROR lines from tests like:
#   "Only http and https URLs are allowed"
#   "Access to internal/local addresses is not allowed"
#   "Unknown function or constant: java.lang.System.exit"
#   "Text 'invalid-date' could not be parsed"
quarkus.log.category."ai.labs.eddi.modules.llm.tools.impl.PdfReaderTool".level=OFF
quarkus.log.category."ai.labs.eddi.modules.llm.tools.impl.WebScraperTool".level=OFF
quarkus.log.category."ai.labs.eddi.modules.llm.tools.impl.CalculatorTool".level=OFF
quarkus.log.category."ai.labs.eddi.modules.llm.tools.impl.DateTimeTool".level=OFF
quarkus.log.category."ai.labs.eddi.modules.llm.tools.impl.DataFormatterTool".level=OFF

