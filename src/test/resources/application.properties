# ===========================================================================
# Test-only overrides — suppress expected error-path log noise
# ===========================================================================
# Many unit tests intentionally trigger error paths (invalid URLs, injection
# attempts, retry exhaustion, rate limiting, etc.). The production code
# correctly logs these at ERROR/WARN, but in tests this creates hundreds of
# distracting lines that bury real failures.
#
# Strategy:
#   1. Suppress ALL ai.labs.eddi.* logging during tests — every noisy logger
#      belongs to this namespace, and tests validate behavior via assertions,
#      not log output.
#   2. Keep framework loggers (Quarkus, CDI, Micrometer) at WARN/ERROR so
#      real infrastructure issues are still visible.
#   3. If you need to temporarily enable logging for a specific class while
#      debugging, override it below with .level=DEBUG.
# ===========================================================================

# --- Root level: WARN (hides INFO/DEBUG noise from third-party libs) ---
quarkus.log.level=WARN

# --- Suppress ALL EDDI application logging during tests ---
# This single line replaces 30+ individual category overrides. All test
# assertions verify behavior via return values and mock interactions, not
# log output. Stack traces from intentional error-path tests (DreamService,
# SummarizationService, RagIngestionService, VaultSecretProvider, etc.) are
# suppressed here.
quarkus.log.category."ai.labs.eddi".level=OFF

# --- Micrometer duplicate registration (harmless, from test isolation) ---
quarkus.log.category."io.micrometer".level=ERROR

# --- Swagger OpenAPI parser (invalid-spec test in McpApiToolBuilderTest) ---
quarkus.log.category."io.swagger.v3.parser".level=ERROR

# --- langchain4j internals (embedding store ingestor, etc.) ---
quarkus.log.category."dev.langchain4j".level=ERROR
