# ===========================================================================
# JBoss LogManager config for plain JUnit tests (non-@QuarkusTest)
# ===========================================================================
# Surefire sets java.util.logging.manager=org.jboss.logmanager.LogManager
# for ALL tests, but the quarkus.log.category.* properties in
# application.properties are ONLY applied when Quarkus bootstraps
# (i.e. @QuarkusTest). Plain JUnit tests use JBoss LogManager but
# without any category configuration, so all ERROR/WARN output leaks
# through.
#
# This file configures JBoss LogManager directly so that the same noisy
# loggers are suppressed for plain JUnit tests too.
# ===========================================================================

# --- Root handler: console only, level WARN ---
handlers=java.util.logging.ConsoleHandler
.level=WARNING

java.util.logging.ConsoleHandler.level=ALL

# --- Suppress the same loggers as application.properties ---

# Built-in tool error-path tests (security validation, bad input)
ai.labs.eddi.modules.llm.tools.impl.PdfReaderTool.level=OFF
ai.labs.eddi.modules.llm.tools.impl.WebScraperTool.level=OFF
ai.labs.eddi.modules.llm.tools.impl.CalculatorTool.level=OFF
ai.labs.eddi.modules.llm.tools.impl.DateTimeTool.level=OFF
ai.labs.eddi.modules.llm.tools.impl.DataFormatterTool.level=OFF

