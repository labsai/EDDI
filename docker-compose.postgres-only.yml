# EDDI with PostgreSQL (no MongoDB)
# Used by: install.sh --db=postgres
#
# PostgreSQL serves as the sole database backend for all EDDI stores.
# Activated via QUARKUS_PROFILE=postgres which switches IResourceStorageFactory
# from MongoResourceStorageFactory to PostgresResourceStorageFactory.

services:
  eddi:
    image: labsai/eddi:6
    environment:
      QUARKUS_PROFILE: postgres
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/eddi
      QUARKUS_DATASOURCE_USERNAME: eddi
      QUARKUS_DATASOURCE_PASSWORD: eddi
      EDDI_DATASTORE_TYPE: postgres
      EDDI_VAULT_MASTER_KEY: "${EDDI_VAULT_MASTER_KEY:-}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${EDDI_PORT:-7070}:7070"
      - "${EDDI_HTTPS_PORT:-7443}:7443"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: eddi
      POSTGRES_USER: eddi
      POSTGRES_PASSWORD: eddi
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eddi -d eddi"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
