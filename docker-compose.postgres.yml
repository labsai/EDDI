version: '3.8'

services:
  eddi:
    image: labsai/eddi:latest
    ports:
      - "7070:7070"
    environment:
      QUARKUS_PROFILE: postgres
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/eddi
      QUARKUS_DATASOURCE_USERNAME: eddi
      QUARKUS_DATASOURCE_PASSWORD: eddi
      EDDI_DATASTORE_TYPE: postgres
      # MongoDB still needed for BotStore, PackageStore, DeploymentStore,
      # DocumentDescriptorStore, ConversationMemoryStore
      MONGODB_CONNECTIONSTRING: mongodb://mongodb:27017/eddi?retryWrites=true&w=majority
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: eddi
      POSTGRES_USER: eddi
      POSTGRES_PASSWORD: eddi
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eddi -d eddi"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

volumes:
  pgdata:
  mongodata:
