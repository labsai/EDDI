name: CI/CD

on:
  push:
    branches: [ main ]
    tags: [ '[0-9]*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  DOCKER_IMAGE: labsai/eddi
  JAVA_VERSION: '25'

jobs:
  # ─── Job 1: Build & Test ────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Set execute permission for mvnw
        run: chmod +x mvnw

      - name: Build and test
        run: ./mvnw clean verify -DskipITs -B

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 14

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

  # ─── Job 2: Integration Tests ─────────────────────────────────
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Set execute permission for mvnw
        run: chmod +x mvnw

      - name: Run integration tests
        run: ./mvnw verify -DskipITs=false -B

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: integration-test-results
          path: target/failsafe-reports/
          retention-days: 14

      - name: Upload integration coverage report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: jacoco-it-report
          path: target/site/jacoco-it/
          retention-days: 14

  # ─── Job 3: Docker Build & Push ─────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: >
      github.event_name == 'push' &&
      github.repository == 'labsai/EDDI' &&
      (startsWith(github.ref, 'refs/tags/') ||
       !contains(github.event.head_commit.message || '', '[skip docker]'))

    outputs:
      primary-tag: ${{ steps.meta.outputs.primary-tag }}
      is-release: ${{ steps.meta.outputs.is-release }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Set execute permission for mvnw
        run: chmod +x mvnw

      - name: Compute Docker tags
        id: meta
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            # Tag push: 6.0.0-RC1
            PRIMARY_TAG="${GITHUB_REF#refs/tags/}"
            IS_RELEASE="true"
          else
            # Branch push: version from pom.xml + build number
            POM_VERSION=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
            PRIMARY_TAG="${POM_VERSION}-b${{ github.run_number }}"
            IS_RELEASE="false"
          fi

          echo "primary-tag=${PRIMARY_TAG}" >> $GITHUB_OUTPUT
          echo "is-release=${IS_RELEASE}" >> $GITHUB_OUTPUT

          echo "### 🐳 Docker Tags" >> $GITHUB_STEP_SUMMARY
          echo "- \`${DOCKER_IMAGE}:${PRIMARY_TAG}\`" >> $GITHUB_STEP_SUMMARY
          if [[ "$IS_RELEASE" == "true" ]]; then
            echo "- \`${DOCKER_IMAGE}:latest\`" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Build application
        run: ./mvnw clean package -DskipTests -Plicense-gen -B

      - name: Build Docker image
        run: |
          PRIMARY_TAG="${{ steps.meta.outputs.primary-tag }}"
          IS_RELEASE="${{ steps.meta.outputs.is-release }}"

          TAGS="-t ${DOCKER_IMAGE}:${PRIMARY_TAG}"
          if [[ "$IS_RELEASE" == "true" ]]; then
            TAGS="${TAGS} -t ${DOCKER_IMAGE}:latest"
          fi

          docker build \
            --build-arg EDDI_VERSION="${PRIMARY_TAG}" \
            --build-arg EDDI_RELEASE="${{ github.run_number }}" \
            -f src/main/docker/Dockerfile.jvm \
            ${TAGS} \
            .

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push to Docker Hub
        run: |
          PRIMARY_TAG="${{ steps.meta.outputs.primary-tag }}"
          IS_RELEASE="${{ steps.meta.outputs.is-release }}"

          docker push ${DOCKER_IMAGE}:${PRIMARY_TAG}
          if [[ "$IS_RELEASE" == "true" ]]; then
            docker push ${DOCKER_IMAGE}:latest
          fi

          echo "### ✅ Pushed to Docker Hub" >> $GITHUB_STEP_SUMMARY

  # ─── Job 4: Smoke Test ──────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Start MongoDB
        run: |
          docker run -d --name mongodb \
            --network host \
            mongo:6.0
          echo "Waiting for MongoDB..."
          for i in $(seq 1 15); do
            if docker exec mongodb mongosh --eval "db.runCommand({ping:1})" > /dev/null 2>&1; then
              echo "✅ MongoDB ready"
              break
            fi
            sleep 1
          done

      - name: Start EDDI
        run: |
          PRIMARY_TAG="${{ needs.docker.outputs.primary-tag }}"
          echo "Starting ${DOCKER_IMAGE}:${PRIMARY_TAG}..."

          docker run -d --name eddi \
            --network host \
            -e "MONGODB_CONNECTIONSTRING=mongodb://localhost:27017/eddi?retryWrites=true&w=majority&connectTimeoutMS=10000&socketTimeoutMS=30000" \
            ${DOCKER_IMAGE}:${PRIMARY_TAG}

      - name: Wait for healthy
        run: |
          echo "Waiting for EDDI to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:7070/q/health/ready > /dev/null 2>&1; then
              echo "✅ EDDI is healthy after $((i * 2))s"
              exit 0
            fi
            sleep 2
          done
          echo "❌ EDDI failed to start within 60s"
          echo "=== EDDI logs ==="
          docker logs eddi
          echo "=== MongoDB logs ==="
          docker logs mongodb
          exit 1

      - name: Verify API responds
        run: |
          echo "=== Health endpoint ==="
          curl -sf http://localhost:7070/q/health/ready | python3 -m json.tool

          echo ""
          echo "=== OpenAPI spec available ==="
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:7070/openapi)
          echo "HTTP ${HTTP_CODE}"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ OpenAPI endpoint returned ${HTTP_CODE}"
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          docker rm -f eddi 2>/dev/null || true
          docker rm -f mongodb 2>/dev/null || true

  # ─── Job 5: Red Hat Preflight (PRs only) ────────────────────────
  preflight-check:
    name: Preflight Dry-Run (Red Hat Certification)
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Set execute permission for mvnw
        run: chmod +x mvnw

      - name: Build application
        run: ./mvnw clean package -DskipTests -Plicense-gen -B

      - name: Build Docker image with Red Hat labels
        run: |
          docker build \
            -f src/main/docker/Dockerfile.jvm \
            -t eddi-preflight-check:test \
            .

      - name: Verify Red Hat labels present
        run: |
          echo "=== Checking required Red Hat labels ==="
          LABELS=$(docker inspect eddi-preflight-check:test --format '{{json .Config.Labels}}')
          echo "$LABELS" | python3 -m json.tool
          MISSING=0
          for label in name vendor version release summary description; do
            if echo "$LABELS" | python3 -c "import sys,json; d=json.load(sys.stdin); assert '$label' in d" 2>/dev/null; then
              echo "✅ Label '$label' present"
            else
              echo "❌ Label '$label' MISSING"
              MISSING=1
            fi
          done
          if [ "$MISSING" -eq 1 ]; then
            echo "::error::Required Red Hat labels are missing"
            exit 1
          fi

      - name: Verify /licenses in container
        run: |
          echo "=== /licenses directory ==="
          docker run --rm --entrypoint="" eddi-preflight-check:test ls -la /licenses/
          echo ""
          echo "=== THIRD-PARTY.txt exists ==="
          docker run --rm --entrypoint="" eddi-preflight-check:test \
            test -f /licenses/THIRD-PARTY.txt && echo "✅ THIRD-PARTY.txt found" || { echo "❌ THIRD-PARTY.txt missing"; exit 1; }

      - name: Install preflight
        run: |
          PREFLIGHT_VERSION=$(curl -s https://api.github.com/repos/redhat-openshift-ecosystem/openshift-preflight/releases/latest | jq -r .tag_name)
          echo "Installing preflight ${PREFLIGHT_VERSION}..."
          curl -sL "https://github.com/redhat-openshift-ecosystem/openshift-preflight/releases/download/${PREFLIGHT_VERSION}/preflight-linux-amd64" \
            -o /usr/local/bin/preflight
          chmod +x /usr/local/bin/preflight
          preflight --version

      - name: Preflight check (local, no submit)
        run: |
          preflight check container \
            eddi-preflight-check:test \
            2>&1 | tee preflight-dryrun.txt || true
          echo ""
          echo "=== Preflight Summary ==="
          if grep -q "FAILED" preflight-dryrun.txt; then
            echo "::warning::Preflight check has failures — review output above."
            echo "Note: Some checks (e.g. HasUniqueTag) require a pushed image and are expected to fail in dry-run."
          else
            echo "✅ All preflight checks passed"
          fi

      - name: Upload preflight dry-run results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: preflight-dryrun
          path: preflight-dryrun.txt
          retention-days: 14

  # ─── Job 6: Slack Notification ─────────────────────────────────
  notify-slack:
    name: Slack Notification
    runs-on: ubuntu-latest
    if: always()
    needs: [build-and-test, integration-test, docker, smoke-test, preflight-check]

    steps:
      - name: Send build notification
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # Skip if no webhook configured
          if [ -z "$SLACK_WEBHOOK" ]; then
            echo "No SLACK_WEBHOOK_URL configured, skipping"
            exit 0
          fi

          # Determine overall status
          BUILD="${{ needs.build-and-test.result }}"
          IT="${{ needs.integration-test.result }}"
          DOCKER="${{ needs.docker.result }}"
          SMOKE="${{ needs.smoke-test.result }}"
          PREFLIGHT="${{ needs.preflight-check.result }}"

          # Map result to emoji
          status_icon() {
            case "$1" in
              success)  echo "✅" ;;
              failure)  echo "❌" ;;
              skipped)  echo "⏭️" ;;
              cancelled) echo "🚫" ;;
              *)        echo "❓" ;;
            esac
          }

          # Overall status
          if [ "$BUILD" = "success" ] && [ "$IT" != "failure" ] && [ "$DOCKER" != "failure" ] && [ "$SMOKE" != "failure" ]; then
            OVERALL_ICON="✅"
            OVERALL_TEXT="Build Passed"
            COLOR="#36a64f"
          else
            OVERALL_ICON="❌"
            OVERALL_TEXT="Build Failed"
            COLOR="#cc0000"
          fi

          # Branch or tag name
          REF="${GITHUB_REF#refs/heads/}"
          REF="${REF#refs/tags/}"
          REF="${REF#refs/pull/}"

          # Truncate commit message
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message || github.event.pull_request.title || 'Manual run' }}" | head -1 | cut -c1-80)

          curl -sf -X POST "$SLACK_WEBHOOK" \
            -H 'Content-type: application/json' \
            -d "{
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": { \"type\": \"plain_text\", \"text\": \"${OVERALL_ICON}  EDDI CI: ${OVERALL_TEXT}\", \"emoji\": true }
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*Branch:* \`${REF}\`  ·  *By:* ${{ github.actor }}\n${COMMIT_MSG}\"
                  }
                },
                {
                  \"type\": \"section\",
                  \"fields\": [
                    { \"type\": \"mrkdwn\", \"text\": \"$(status_icon $BUILD) Build & Test\" },
                    { \"type\": \"mrkdwn\", \"text\": \"$(status_icon $IT) Integration Tests\" },
                    { \"type\": \"mrkdwn\", \"text\": \"$(status_icon $DOCKER) Docker Push\" },
                    { \"type\": \"mrkdwn\", \"text\": \"$(status_icon $SMOKE) Smoke Test\" },
                    { \"type\": \"mrkdwn\", \"text\": \"$(status_icon $PREFLIGHT) Red Hat Preflight\" }
                  ]
                },
                {
                  \"type\": \"context\",
                  \"elements\": [
                    { \"type\": \"mrkdwn\", \"text\": \"<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run #${{ github.run_number }}>\" }
                  ]
                }
              ]
            }"
