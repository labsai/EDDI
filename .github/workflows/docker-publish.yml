name: Docker Publish

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    # Only run if Docker Hub secrets are configured
    if: github.repository == 'labsai/EDDI'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Set execute permission for mvnw
        run: chmod +x mvnw

      - name: Build and package
        run: >
          ./mvnw clean package -DskipTests -B
          -Dquarkus.container-image.build=true
          "-Dquarkus.container-image.additional-tags=6.0.0-b${{ github.run_number }},6.0.0,latest"

      - name: Login to Docker Hub
        if: env.DOCKER_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

      - name: Push to Docker Hub
        if: env.DOCKER_USERNAME != ''
        run: |
          docker push labsai/eddi:6.0.0-b${{ github.run_number }}
          docker push labsai/eddi:6.0.0
          docker push labsai/eddi:latest
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
