name: OpenSSF Scorecard
on:
  # Run on pushes to main/default branch only
  branch_protection_rule:
  push:
    branches: [ "main", "feature/version-6.0.0" ]
  schedule:
    # Weekly Saturday at 01:30 UTC
    - cron: '30 1 * * 6'

# Least-privilege: read-all at workflow level, override per job
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Required to publish results via OIDC
      id-token: write
      # Required to upload SARIF to code-scanning
      security-events: write
      actions: read
      contents: read

    steps:
      - name: "Checkout code"
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: "Run OpenSSF Scorecard"
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish results to enable badge + REST API access
          publish_results: true

      - name: "Upload SARIF artifact"
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: "Upload to code-scanning"
        uses: github/codeql-action/upload-sarif@3b1a19a80ab047f35cbb237b5bd9bdc1e14f166c # v3
        with:
          sarif_file: results.sarif
