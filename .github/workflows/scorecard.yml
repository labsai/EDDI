name: OpenSSF Scorecard
on:
  # Run on pushes to main/default branch only
  branch_protection_rule:
  push:
    branches: [ "main" ]
  schedule:
    # Weekly Saturday at 01:30 UTC
    - cron: '30 1 * * 6'

# Least-privilege: read-all at workflow level, override per job
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Required to publish results via OIDC
      id-token: write
      # Required to upload SARIF to code-scanning
      security-events: write
      actions: read
      contents: read

    steps:
      - name: "Checkout code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: "Run OpenSSF Scorecard"
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish results to enable badge + REST API access
          publish_results: true

      - name: "Upload SARIF artifact"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: "Upload to code-scanning"
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: results.sarif
