name: 🐛 Bug Report
description: Report a bug or unexpected behavior in EDDI
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "When I try to ... it does ... instead of ..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Create a agent with ...
        2. Send message '...'
        3. Observe error in ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: EDDI Version
      description: "Which version of EDDI are you using?"
      placeholder: "e.g., 6.0.0"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Method
      options:
        - Docker (docker-compose)
        - Docker (standalone)
        - Kubernetes / OpenShift
        - Dev mode (quarkus:dev)
        - Native image
        - Other
    validations:
      required: true

  - type: input
    id: java-version
    attributes:
      label: Java Version
      placeholder: "e.g., 25"

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g., Ubuntu 24.04, Windows 11, macOS 15"

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output here. This will be automatically formatted as code.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this hasn't been reported before
          required: true
        - label: I am using a supported version of EDDI
          required: true
