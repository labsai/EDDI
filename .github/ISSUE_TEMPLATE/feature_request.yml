name: 💡 Feature Request
description: Suggest a new feature or enhancement for EDDI
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe the problem and your proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this feature solve? Why is it needed?
      placeholder: "I'm always frustrated when ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered.

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or examples.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of EDDI does this relate to?
      options:
        - Core Engine / Pipeline
        - LLM Integration (LangChain)
        - MCP Server
        - REST API
        - Bot Manager UI
        - Chat UI
        - Documentation
        - DevOps / Docker / Kubernetes
        - Other

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I would be willing to submit a PR for this feature
