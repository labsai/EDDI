services:
  eddi:
    image: labsai/eddi:latest
    ports:
      - "7070:7070"
    depends_on:
      - mongodb
    networks:
      - monitoring

  prometheus:
    build:
      context: .
      dockerfile: docker/prometheus/Dockerfile
    ports:
      - "9090:9090"
    networks:
      - monitoring

  grafana:
    build:
      context: .
      dockerfile: docker/grafana/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - grafana-datastore:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=secret
    networks:
      - monitoring

  mongodb:
    image: mongo:7.0
    restart: always
    volumes:
      - mongodb-datastore:/data/db
    networks:
      - monitoring

volumes:
  grafana-datastore:
  mongodb-datastore:

networks:
  monitoring:
