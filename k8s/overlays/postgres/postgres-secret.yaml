# PostgreSQL credentials
# ⚠️  Change these values for production deployments!
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: eddi
type: Opaque
stringData:
  POSTGRES_DB: "eddi"
  POSTGRES_USER: "eddi"
  POSTGRES_PASSWORD: "eddi"
  # These are also provided to the EDDI container for JDBC connection
  QUARKUS_DATASOURCE_USERNAME: "eddi"
  QUARKUS_DATASOURCE_PASSWORD: "eddi"
