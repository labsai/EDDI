# NATS Service
apiVersion: v1
kind: Service
metadata:
  name: nats
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/component: messaging
    app.kubernetes.io/part-of: eddi
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: nats
    app.kubernetes.io/component: messaging
  ports:
    - name: client
      port: 4222
      targetPort: client
    - name: monitoring
      port: 8222
      targetPort: monitoring
