# EDDI Configuration — non-secret settings
# Override these values for your environment.
apiVersion: v1
kind: ConfigMap
metadata:
  name: eddi-config
  labels:
    app.kubernetes.io/name: eddi
    app.kubernetes.io/component: server
data:
  # Database backend: "mongodb" (default) or "postgres"
  EDDI_DATASTORE_TYPE: "mongodb"

  # MongoDB connection string (used when EDDI_DATASTORE_TYPE=mongodb)
  MONGODB_CONNECTIONSTRING: "mongodb://mongodb:27017/eddi?retryWrites=true&w=majority&connectTimeoutMS=10000&socketTimeoutMS=30000"

  # PostgreSQL (used when EDDI_DATASTORE_TYPE=postgres)
  # QUARKUS_PROFILE: "postgres"
  # QUARKUS_DATASOURCE_JDBC_URL: "jdbc:postgresql://postgres:5432/eddi"
  # QUARKUS_DATASOURCE_USERNAME: "eddi"

  # Messaging: "in-memory" (default, single replica) or "nats" (multi-replica)
  EDDI_MESSAGING_TYPE: "in-memory"

  # CORS — add your frontend origin(s) here
  QUARKUS_HTTP_CORS_ORIGINS: "http://localhost:3000,http://localhost:7070"

  # OIDC Authentication (disabled by default)
  QUARKUS_OIDC_TENANT_ENABLED: "false"
